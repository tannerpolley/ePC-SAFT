id: ascani_2022_distributed_ion_lle
title: Ascani 2022 distributed-ion electrolyte LLE
status: executable
summary: Source-like Ascani 2022 mixed-solvent electrolyte LLE sanity lane through the public API and native Ipopt Gibbs minimization.
source_assets:
  - path: docs/papers/md/Ascani, Sadowski, Held - 2022 - Calculation of Multiphase Equilibria Containing Mixed Solvents and M.md
    kind: paper_markdown
  - path: docs/papers/md/Ascani, Sadowski, Held - 2022 - Supporting Information for Calculation of multiphase equilibria containing mixed solvents and mixed..md
    kind: supporting_information_markdown
  - path: data/reference/multiphase/ascani_case2_model_comparison.csv
    kind: source_backed_case2_comparison
commands:
  paper_validation:
    - uv run python analyses\paper_validation\native\2022_ascani\scripts\run_all.py
expected:
  feed_species: [H2O, Butanol, Na+, Cl-]
  temperature_K: 298.15
  pressure_Pa: 101300.0
  accepted: true
  solver_backend: ipopt
  phase_distance_min: 0.1
  aqueous_ion_fraction_exceeds_organic: true
  organic_butanol_exceeds_aqueous: true
tolerances:
  material_balance_abs: 1.0e-8
  charge_balance_abs: 1.0e-8
  phase_distance_min: 0.1
outputs:
  - path: analyses/paper_validation/native/2022_ascani/data/processed/source_expected_phase_compositions.csv
    kind: normalized_source_expectations
  - path: analyses/paper_validation/native/2022_ascani/results/electrolyte_lle/summary.json
    kind: accepted_solve_summary
claim_boundary:
  note: This gate proves accepted native Ipopt electrolyte LLE execution and a physically sensible water/ion-rich versus butanol-rich phase split. It does not claim an exact match to Ascani 2022 Case 2 mixed NaCl/KCl phase compositions.
