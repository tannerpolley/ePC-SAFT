name: local-development-smoke

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      full_wheel_matrix:
        description: "Run the full Linux/macOS/Windows wheel and sdist packaging checks"
        required: false
        default: false
        type: boolean

jobs:
  windows-install-smoke:
    name: windows install smoke
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Build Windows wheel
        run: uv build --wheel

      - name: Install wheel into fresh environment
        shell: pwsh
        run: |
          uv venv --python 3.12 .venv-smoke
          $wheel = (Get-ChildItem -LiteralPath dist -Filter '*.whl' | Select-Object -First 1).FullName
          uv pip install --python .\.venv-smoke\Scripts\python.exe $wheel

      - name: Smoke installed package
        shell: pwsh
        run: >
          .\.venv-smoke\Scripts\python.exe -c "import numpy as np; import epcsaft; import epcsaft._core;
          m = epcsaft.ePCSAFTMixture.from_params({'m': np.asarray([1.0]), 's': np.asarray([3.7039]), 'e': np.asarray([150.03])});
          state = m.state(T=300.0, x=np.asarray([1.0]), rho=100.0);
          print(state.compressibility_factor())"

  build:
    name: build wheels / ${{ matrix.os }}
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.full_wheel_matrix }}
    runs-on: ${{ matrix.os }}
    needs: windows-install-smoke
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --locked --no-install-project

      - name: Build wheels
        run: uv run --locked cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp312-*"
          CIBW_SKIP: "pp* *-win32 *-musllinux*"
          CIBW_TEST_REQUIRES: "numpy"
          CIBW_TEST_COMMAND: "python -c \"import numpy as np; import epcsaft; import epcsaft._core; m=epcsaft.ePCSAFTMixture.from_params({'m': np.asarray([1.0]), 's': np.asarray([3.7039]), 'e': np.asarray([150.03])}); s=m.state(T=300.0, x=np.asarray([1.0]), rho=100.0); print(s.compressibility_factor())\""

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  sdist:
    name: build sdist
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.full_wheel_matrix }}
    runs-on: ubuntu-latest
    needs: windows-install-smoke

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Build sdist
        run: uv build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
