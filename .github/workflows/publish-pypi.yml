name: publish-to-pypi

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish, usually a tag such as v1.5.2"
        required: true
        default: "v1.5.2"
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name || inputs.ref }}
  cancel-in-progress: false

jobs:
  build-sdist:
    name: build sdist
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Build sdist
        run: uv build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v7.0.1
        with:
          name: pypi-sdist
          path: dist/*.tar.gz

  build-wheels:
    name: build wheels / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --locked --no-install-project

      - name: Build wheels
        run: uv run --locked cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp313-*"
          CIBW_SKIP: "pp* *-win32 *-musllinux*"
          CIBW_TEST_REQUIRES: "numpy"
          CIBW_TEST_COMMAND: "python -c \"import numpy as np; import epcsaft; import epcsaft._core; m=epcsaft.ePCSAFTMixture.from_params({'m': np.asarray([1.0]), 's': np.asarray([3.7039]), 'e': np.asarray([150.03])}); s=m.state(T=300.0, x=np.asarray([1.0]), rho=100.0); print(s.compressibility_factor())\""

      - name: Upload wheels
        uses: actions/upload-artifact@v7.0.1
        with:
          name: pypi-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  publish:
    name: publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-sdist, build-wheels]
    environment:
      name: pypi
      url: https://pypi.org/project/epcsaft/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v7.0.1
        with:
          pattern: pypi-*
          path: dist
          merge-multiple: true

      - name: Show distributions
        run: ls -lh dist

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
