<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Paper Validation / 2014 Held / Figure 2</title>
  <style>
    :root {
      color-scheme: light;
      --page-max: 1200px;
      --nav-bg: rgba(255, 255, 255, 0.96);
      --border: #d9d9d9;
      --text: #1b1b1b;
      --muted: #5f5f5f;
      --accent: #0f5fbf;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: #ffffff;
      line-height: 1.45;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--nav-bg);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
    }
    .header-inner {
      max-width: var(--page-max);
      margin: 0 auto;
      padding: 1rem 1.25rem 0.85rem;
    }
    h1 { margin: 0 0 0.35rem; font-size: 1.5rem; font-weight: 700; }
    .summary { margin: 0 0 0.8rem; color: var(--muted); font-size: 0.95rem; }
    nav, .child-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .section-button, .back-link, .child-card {
      appearance: none;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.35rem 0.8rem;
      font-size: 0.92rem;
      background: #fff;
      color: var(--accent);
      cursor: pointer;
      text-decoration: none;
      transition: background 120ms ease, color 120ms ease, border-color 120ms ease;
    }
    .section-button.is-active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .child-card { display: inline-flex; gap: 0.5rem; align-items: center; }
    .child-card strong { color: var(--muted); font-weight: 500; }
    .back-link { display: inline-flex; margin-bottom: 0.8rem; }
    main { max-width: var(--page-max); margin: 0 auto; padding: 1.25rem; }
    .child-section { margin: 0 0 1.25rem; }
    .child-section h2, .gallery-section > h2 {
      margin: 0 0 0.85rem;
      font-size: 1.35rem;
      border-bottom: 2px solid #efefef;
      padding-bottom: 0.4rem;
    }
    .gallery-section { display: none; margin: 0 0 2.5rem; padding-top: 0.25rem; }
    .gallery-section.is-active { display: block; }
    .image-card {
      margin: 0 0 1.5rem;
      padding: 0.85rem;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fcfcfc;
    }
    .caption {
      margin: 0 0 0.6rem;
      font-size: 0.92rem;
      color: var(--muted);
      font-family: Consolas, "Courier New", monospace;
      word-break: break-word;
    }
    .image-link { display: block; text-decoration: none; }
    img { display: block; width: 100%; max-width: 100%; height: auto; border-radius: 8px; background: #fff; }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a class="back-link" href="../index.html">Back</a>
      <h1>Paper Validation / 2014 Held / Figure 2</h1>
      <p class="summary">Browsable gallery for 1 PNG files under docs/plots/paper_validation/2014_Held/figure_2.</p>
      <nav>
        <button type="button" class="section-button" data-target="section-1">Top Level (1)</button>
      </nav>
    </div>
  </header>
  <main>
    <section class="child-section">
      <h2>Subfolders</h2>
      <div class="child-grid">
        <span class="summary">No child galleries.</span>
      </div>
    </section>
    <section id="section-1" class="gallery-section">
      <h2>Top Level</h2>
      <article class="image-card"><p class="caption">figure_2.png</p><a class="image-link" href="figure_2.png"><img src="figure_2.png" alt="figure 2"></a></article>
    </section>
  </main>
  <script>
    (function() {
      const buttons = Array.from(document.querySelectorAll('.section-button'));
      const sections = Array.from(document.querySelectorAll('.gallery-section'));
      const defaultSection = "section-1";

      function activateSection(sectionId) {
        const targetId = sectionId || defaultSection;
        sections.forEach((section) => section.classList.toggle('is-active', section.id === targetId));
        buttons.forEach((button) => button.classList.toggle('is-active', button.dataset.target === targetId));
        if (targetId) {
          if (window.location.hash !== '#' + targetId) {
            history.replaceState(null, '', '#' + targetId);
          }
          window.scrollTo({ top: 0, behavior: 'auto' });
        }
      }

      buttons.forEach((button) => button.addEventListener('click', () => activateSection(button.dataset.target)));
      const initialHash = window.location.hash ? window.location.hash.slice(1) : '';
      const hasInitialTarget = sections.some((section) => section.id === initialHash);
      activateSection(hasInitialTarget ? initialHash : defaultSection);
    })();
  </script>
</body>
</html>
