version: 2

goal:
  title: "ePC-SAFT Architecture Deepening"
  slug: "epcsaft-architecture-deepening"
  kind: existing_plan
  tranche: "Implement all five architecture deepening candidates through successive safe verified slices."
  status: active
  intake:
    original_request: "Lets prep a goal to implement all of these changes."
    interpreted_outcome: "The five architecture deepening candidates from the architecture review are implemented, tested, and locally committed."
    input_shape: existing_plan
    audience: "ePC-SAFT package maintainers and downstream consumers"
    authority: requested
    proof_type: test
    completion_proof: "Each of the five deepening slices has a receipt, focused tests pass, the selected high-level validation ladder passes, cleanup passes, git status is clean, and local commits exist."
    likely_misfire: "Creating docs, wrappers, or registrations that look architectural while the real route/result/target/parameter/capability complexity remains spread across callers."
    blind_spots_considered:
      - "Native _core rebuild coordination and import locks."
      - "Ipopt and Ceres are build-mode dependent and must not be overclaimed from a fast build."
      - "Capability claims must track validated production paths, not aspirations."
      - "Reactive staged workflows must stay separate from coupled production reactive LLE claims."
      - "Public compatibility matters because downstream consumers use generic package contracts."
    existing_plan_facts:
      - "Candidate 1: deepen the Equilibrium Problem module."
      - "Candidate 2: deepen the Production Solver Path result gate."
      - "Candidate 3: deepen Target Dataset and Regression Problem."
      - "Candidate 4: deepen Parameter Family compilation."
      - "Candidate 5: deepen Capability Contract generation."
      - "Architecture review recommended starting with Equilibrium Problem unless live evidence changes the dependency order."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://127.0.0.1:52660/epcsaft-architecture-deepening/"
    command: "& C:\\Users\\Tanner\\Documents\\git\\codex-maintenance\\scripts\\start-goalbuddy-board.ps1 -Goal docs/goals/epcsaft-architecture-deepening -Port 52660"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: T001

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: active
    reasoning_hint: low
    objective: "Validate the five-candidate architecture plan against the live worktree before implementation."
    inputs:
      - "CONTEXT.md"
      - "docs/adr/README.md"
      - "docs/roadmaps/FULL_ROADMAP.md"
      - "src/epcsaft/equilibrium.py"
      - "src/epcsaft/epcsaft.py"
      - "src/epcsaft/equilibrium_core/"
      - "src/epcsaft/regression.py"
      - "src/epcsaft/reactive_regression.py"
      - "src/epcsaft/parameter_schema.py"
      - "src/epcsaft/parameters.py"
      - "src/epcsaft/runtime.py"
      - "tests/"
    constraints:
      - "Read-only."
      - "Do not edit implementation files."
      - "Do not rebuild _core."
      - "Use CONTEXT.md vocabulary: Equilibrium Problem, Production Solver Path, Target Dataset, Parameter Family, Capability Contract."
      - "Preserve the five existing plan facts unless live evidence proves one is stale."
    expected_output:
      - "Evidence map for all five candidates."
      - "Current branch and dirty-state summary."
      - "Dependency order recommendation."
      - "First Worker package recommendation with allowed_files, verify commands, and stop_if conditions."
    receipt: null

  - id: T002
    type: judge
    assignee: Judge
    status: queued
    reasoning_hint: high
    objective: "Decide the implementation order and select the first largest safe useful Worker package."
    inputs:
      - "T001 receipt"
      - "docs/goals/epcsaft-architecture-deepening/goal.md"
      - "docs/goals/epcsaft-architecture-deepening/state.yaml"
    constraints:
      - "Do not implement."
      - "Reject a plan that only adds pass-through modules or documentation."
      - "Reject completion criteria that rely on inventory, diagnostics, staged workflows, synthetic-only proof, or capability overclaims."
      - "If a decision is hard to reverse and surprising, request an ADR task before Worker implementation."
    expected_output:
      - "ordered_candidates"
      - "first_worker_objective"
      - "allowed_files"
      - "verify"
      - "stop_if"
      - "ADR needed: yes | no"
    receipt: null

  - id: T010
    type: worker
    assignee: Worker
    status: queued
    reasoning_hint: high
    objective: "Deepen the Equilibrium Problem module so typed problem objects own route validation and dispatch instead of remaining shallow delegates over mixture.equilibrium kind strings."
    allowed_files:
      - "src/epcsaft/equilibrium.py"
      - "src/epcsaft/epcsaft.py"
      - "src/epcsaft/equilibrium_core/classify.py"
      - "tests/equilibrium/core/"
      - "tests/api/equilibrium/"
      - "tests/api/reactive/"
      - "tests/api/package/test_downstream_integration_smokes.py"
      - "docs/adr/"
      - "CONTEXT.md"
    verify:
      - "uv run python run_pytest.py tests/equilibrium/core tests/api/equilibrium tests/api/reactive/test_reactive_phase_equilibrium_problem_routes_native.py tests/api/reactive/test_staged_reactive_route_not_production.py -q"
      - "uv run python scripts/dev/check_text_gates.py"
    stop_if:
      - "A public compatibility break is needed."
      - "Implementation requires changing native route behavior before the Python seam is clarified."
      - "The Worker needs files outside allowed_files."
      - "Focused tests fail twice for unrelated native build reasons."
    receipt: null

  - id: T011
    type: judge
    assignee: Judge
    status: queued
    reasoning_hint: high
    objective: "Review the Equilibrium Problem slice for depth, locality, public compatibility, and test adequacy."
    inputs:
      - "T010 receipt"
      - "Current diff"
      - "Focused test output"
    constraints:
      - "Do not implement."
      - "Reject shallow wrapper-only changes."
      - "Reject if mixture.equilibrium still owns the same route complexity without a planned follow-up."
    expected_output:
      - "accept | reject"
      - "remaining risks"
      - "next task recommendation"
    receipt: null

  - id: T020
    type: worker
    assignee: Worker
    status: queued
    reasoning_hint: high
    objective: "Deepen the Production Solver Path result gate so accepted/rejected native route translation has one clear interface and less duplicated diagnostics glue."
    allowed_files:
      - "src/epcsaft/equilibrium.py"
      - "src/epcsaft/equilibrium_core/native_results.py"
      - "src/epcsaft/equilibrium_core/native_requests.py"
      - "src/epcsaft/native/equilibrium_nlp/result_builder.cpp"
      - "src/epcsaft/native/equilibrium_nlp/result_builder.h"
      - "src/epcsaft/native/equilibrium_nlp/route_builders.cpp"
      - "src/epcsaft/native/equilibrium_nlp/route_builders.h"
      - "tests/equilibrium/"
      - "tests/native/equilibrium/"
      - "tests/api/equilibrium/"
      - "tests/workflows/paper_validation/"
    verify:
      - "uv run python run_pytest.py tests/native/equilibrium tests/equilibrium/electrolyte tests/api/equilibrium -q"
      - "uv run python scripts/dev/check_text_gates.py"
    stop_if:
      - "A clean _core rebuild is required while another task may import _core."
      - "Acceptance semantics would change without a focused regression test."
      - "The Worker needs files outside allowed_files."
    receipt: null

  - id: T030
    type: worker
    assignee: Worker
    status: queued
    reasoning_hint: high
    objective: "Deepen Target Dataset and Regression Problem so target-family compilation and regression evidence are shared across generic and reactive regression paths."
    allowed_files:
      - "src/epcsaft/regression.py"
      - "src/epcsaft/reactive_regression.py"
      - "src/epcsaft/runtime.py"
      - "tests/api/regression/"
      - "tests/api/reactive/"
      - "tests/regression/"
      - "tests/native/ceres/"
    verify:
      - "uv run python run_pytest.py tests/api/regression tests/api/reactive/test_reactive_regression_setup.py tests/api/reactive/test_reactive_regression_execution.py tests/api/reactive/test_reactive_regression_diagnostics.py tests/native/ceres -q"
      - "uv run python scripts/dev/check_text_gates.py"
    stop_if:
      - "The slice would turn diagnostic reactive residual contexts into claimed production optimizers without native Ceres evidence."
      - "The Worker needs files outside allowed_files."
      - "Ceres build availability is ambiguous and not documented in the receipt."
    receipt: null

  - id: T040
    type: worker
    assignee: Worker
    status: queued
    reasoning_hint: high
    objective: "Deepen Parameter Family compilation around ParameterSet so dataset loading becomes an adapter and mixture construction consumes a clearer canonical parameter interface."
    allowed_files:
      - "src/epcsaft/parameter_schema.py"
      - "src/epcsaft/parameters.py"
      - "src/epcsaft/epcsaft.py"
      - "src/epcsaft/dataset_validation.py"
      - "src/epcsaft/parameter_templates.py"
      - "tests/api/parameters/"
      - "tests/api/runtime/"
      - "tests/equilibrium/"
      - "tests/native/"
    verify:
      - "uv run python run_pytest.py tests/api/parameters tests/api/runtime/test_runtime_exports_and_metadata.py tests/equilibrium/core/test_api.py -q"
      - "uv run python scripts/dev/check_text_gates.py"
    stop_if:
      - "Dataset resolution changes numerical payloads without a focused before/after test."
      - "A downstream-specific parameter path is being added."
      - "The Worker needs files outside allowed_files."
    receipt: null

  - id: T050
    type: worker
    assignee: Worker
    status: queued
    reasoning_hint: high
    objective: "Deepen Capability Contract generation so capabilities are derived from registered problem, regression, derivative, and solver-path evidence rather than parallel hand-maintained lists."
    allowed_files:
      - "src/epcsaft/runtime.py"
      - "src/epcsaft/__init__.py"
      - "src/epcsaft/equilibrium.py"
      - "src/epcsaft/regression.py"
      - "tests/api/runtime/"
      - "tests/api/package/"
      - "tests/native/contracts/"
      - "docs/adr/"
      - "CONTEXT.md"
    verify:
      - "uv run python run_pytest.py tests/api/runtime tests/api/package tests/native/contracts/test_derivative_coverage_matrix.py tests/native/contracts/test_property_derivative_backend_contract.py -q"
      - "uv run python scripts/dev/check_text_gates.py"
    stop_if:
      - "A capability would claim support before executable evidence exists."
      - "Capability generation needs a public-interface decision that should become an ADR first."
      - "The Worker needs files outside allowed_files."
    receipt: null

  - id: T090
    type: judge
    assignee: Judge
    status: queued
    reasoning_hint: high
    objective: "Run a cross-slice architecture review before final validation."
    inputs:
      - "Receipts for T010, T020, T030, T040, and T050"
      - "Current diff"
      - "Focused verification results"
    constraints:
      - "Do not implement."
      - "Reject if any candidate is only partially implemented without a queued follow-up."
      - "Reject if public contracts overclaim unsupported production paths."
    expected_output:
      - "accept | reject"
      - "missing slice work"
      - "final validation plan"
    receipt: null

  - id: T100
    type: worker
    assignee: Worker
    status: queued
    reasoning_hint: medium
    objective: "Run final validation, cleanup, and local commit for the completed architecture deepening tranche."
    allowed_files:
      - "Any files already changed by accepted Worker slices."
      - "docs/goals/epcsaft-architecture-deepening/state.yaml"
      - "docs/goals/epcsaft-architecture-deepening/notes/"
    verify:
      - "uv run python scripts/dev/validate_project.py quick"
      - "uv run python scripts/dev/check_text_gates.py"
      - "pwsh.exe -NoProfile -ExecutionPolicy Bypass -File \"$env:USERPROFILE\\.codex\\hooks\\codex-cleanup.ps1\" -RepoRoot ."
      - "git status --short --branch"
    stop_if:
      - "Validation fails for a reason that needs implementation beyond accepted Worker slices."
      - "Tracked changes include unrelated user edits that need owner decision."
    receipt: null

  - id: T999
    type: judge
    assignee: Judge
    status: queued
    reasoning_hint: high
    objective: "Audit whether all five architecture deepening candidates are implemented, tested, and locally committed."
    inputs:
      - "All task receipts"
      - "Final validation output"
      - "Git status"
      - "Commit log for this goal"
    constraints:
      - "Do not implement."
      - "Reject completion if any candidate remains queued, blocked without an accepted non-goal, or only documented."
      - "Reject completion if validation is skipped without a concrete recorded blocker."
    expected_output:
      - "complete | not_complete"
      - "full_outcome_complete: true | false"
      - "candidate coverage map"
      - "validation evidence"
      - "remaining risks"
    receipt: null

checks:
  dirty_fingerprint: "clean at prep on branch codex/rezaee-reactive-electrolyte-lle"
  last_verification:
    result: unknown
    task: null
    commands: []
