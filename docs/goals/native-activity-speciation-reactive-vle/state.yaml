version: 2

goal:
  title: "Native Activity Speciation Reactive VLE"
  slug: "native-activity-speciation-reactive-vle"
  kind: existing_plan
  tranche: "Complete the full issue #115 vertical implementation through native backend, derivative path, Python API, benchmark proof, docs, and validation."
  status: active
  intake:
    original_request: "Read issue #115 on GitHub and set up a GoalBuddy board for all phases to follow issue #115 explicitly in all steps."
    interpreted_outcome: "A GoalBuddy board exists that turns issue #115 into an executable phased plan with the issue completion contract preserved at every step."
    input_shape: existing_plan
    audience: "ePC-SAFT maintainers and downstream MEA-Thermodynamics consumers"
    authority: requested
    proof_type: artifact
    completion_proof: "goal.md, state.yaml, and notes/intake.md exist, validate with the GoalBuddy checker, and encode all issue #115 stages, constraints, owned paths, validation commands, and completion gates."
    likely_misfire: "A future /goal run could treat intake, diagnostics, staged support, schema support, synthetic payloads, or a partial benchmark as completing issue #115."
    blind_spots_considered:
      - "Issue #115 bans multiple implementation escape routes and requires a full vertical production path."
      - "Goal files themselves must avoid the old contiguous missing-backend token and old numeric-differencing token family."
      - "Downstream MEA-Thermodynamics evidence makes this package issue the active blocker, but the package API must stay generic."
      - "Native regression code is explicitly out of edit scope."
      - "JetBrains MCP should be used for semantic tracing when it materially improves correctness."
    existing_plan_facts:
      - "GitHub issue #115 title: Implement native coupled activity speciation and reactive VLE pressure benchmark."
      - "Issue #115 completion requires native backend, derivative/sensitivity path, Python API surface, pytest suite, docs, and benchmark proof to pass together."
      - "Stage 0 requires docs/goals/native-activity-speciation-reactive-vle/notes/intake.md before source edits."
      - "Stage 1 requires native coupled activity speciation with ePC-SAFT activity/fugacity evaluation inside residuals."
      - "Stage 2 requires implicit sensitivity for solved composition."
      - "Stage 3 requires volatile-neutral fugacity-equilibrium pressure or partial-pressure path."
      - "Stage 4 requires generic Python API exposure only."
      - "Stage 5 requires a generic CO2 + amine + water pressure/speciation benchmark with repo-contained fixture data."
      - "Required validation includes clean CppAD build, native equilibrium tests, reactive API tests, equilibrium tests, quick validation, docs validation, and git diff whitespace check."
      - "Downstream comment states MEA-Thermodynamics issue #5 now has source-verified R1-R5 activity constants and needs a generic package route for activity-coupled true-species speciation."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://127.0.0.1:41737/native-activity-speciation-reactive-vle/"
    command: "& C:\\Users\\Tanner\\Documents\\git\\codex-maintenance\\scripts\\start-goalbuddy-board.ps1 -Goal docs/goals/native-activity-speciation-reactive-vle"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: T001

