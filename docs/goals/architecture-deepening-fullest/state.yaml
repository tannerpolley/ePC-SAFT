version: 2

goal:
  title: "Architecture Deepening Fullest"
  slug: "architecture-deepening-fullest"
  kind: existing_plan
  tranche: "continuous execution: implement all five latest architecture candidates through safe verified slices until complete or explicitly blocked"
  status: done
  intake:
    original_request: "/goal Implement all the candidates to their fullest"
    interpreted_outcome: "Implement the five latest architecture-deepening candidates with durable code, tests, docs where useful, and honest completion evidence."
    input_shape: existing_plan
    audience: "ePC-SAFT package maintainers and downstream consumers"
    authority: requested
    proof_type: test
    completion_proof: "All five candidate lanes have implemented or explicitly blocked receipts, focused tests pass, capability claims remain evidence-backed, cleanup passes, and tracked repo changes are committed locally unless redirected."
    likely_misfire: "Repeating completed earlier architecture boards, producing only planning artifacts, or adding shallow wrappers without improving Locality and Leverage at the real seams."
    blind_spots_considered:
      - "The previous architecture-deepening board is complete and covered an older six-candidate set."
      - "The architecture-deepening-followup board is complete but does not fully cover the five latest candidates."
      - "Native _core rebuild and clean actions must be coordinated by the main thread."
      - "Public API behavior and downstream consumer expectations must remain stable unless tests justify a change."
      - "Capability Contract claims must not broaden without Completion Evidence."
      - "Derivative Path and route-diagnostics changes need focused native or API validation."
    existing_plan_facts:
      - "Candidate 1: Native Route Bridge Module."
      - "Candidate 2: Equilibrium Route Recipe Module."
      - "Candidate 3: Regression Problem Assembly Module."
      - "Candidate 4: Parameter Source Resolution Module."
      - "Candidate 5: EOS Harness State View Module."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://127.0.0.1:41737/architecture-deepening-fullest/"
    command: "pwsh -NoProfile -ExecutionPolicy Bypass -File C:\\Users\\Tanner\\Documents\\git\\codex-maintenance\\scripts\\start-goalbuddy-board.ps1 -Goal docs/goals/architecture-deepening-fullest"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: null

