    type: scout
    assignee: Scout
    status: done
    reasoning_hint: high
    objective: "Map the five latest architecture-deepening candidates into safe implementation work packages."
    inputs:
      - "Latest improve-codebase-architecture candidate list from the current thread."
      - "docs/goals/architecture-deepening/state.yaml"
      - "docs/goals/architecture-deepening-followup/state.yaml"
      - "CONTEXT.md"
      - "docs/adr/0001-architecture-deepening-public-api-boundaries.md"
      - "docs/roadmaps/FULL_ROADMAP.md"
      - "docs/roadmaps/unified_equilibrium_core_algorithm.md"
    constraints:
      - "Read-only."
      - "Do not edit implementation files."
      - "Avoid duplicating completed board work unless a new deeper slice remains."
      - "Assign disjoint write ownership for future Worker slices."
      - "Main thread owns native rebuild coordination."
    expected_output:
      - "Candidate-to-existing-work coverage map."
      - "Recommended Worker slices with allowed_files, verify commands, and stop_if conditions."
