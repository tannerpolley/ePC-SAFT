version: 2

goal:
  title: "Convert benchmark inventory and downstream smokes into executable release gates"
  slug: "benchmark-release-gates"
  kind: existing_plan
  tranche: "Execute issue #119 phases in order, proving executable literature benchmarks and real downstream workflow gates without changing core package behavior in this validation issue."
  status: active
  intake:
    original_request: "Read issue #119 on GitHub and set up a GoalBuddy board for all phases, following issue #119 explicitly in all steps."
    interpreted_outcome: "A phase-complete GoalBuddy board exists for issue #119 with one safe intake task active and every later phase mapped to the issue's registry, executable command, tolerance, downstream, reporting, validation, and completion gates."
    input_shape: existing_plan
    audience: "Future ePC-SAFT validation agents and the package maintainer."
    authority: requested
    proof_type: artifact
    completion_proof: "docs/goals/benchmark-release-gates/goal.md and state.yaml validate, preserve issue #119 scope guards, and encode every required phase, benchmark family, downstream repo, report, validation command, and completion check."
    likely_misfire: "Treating benchmark inventory, package-local synthetic smokes, or documentation-only status as completion of issue #119, or silently editing core implementation under a validation issue."
    blind_spots_considered:
      - "Issue #119 is a release-gating and validation issue, not a license to implement missing thermodynamic behavior in core package code."
      - "Some benchmark and workflow scaffolding already exists; the goal is executable proof with tolerances, not a second inventory of existing files."
      - "A downstream workflow may expose missing package behavior; that gap must be reported back to its owning implementation issue instead of being hidden inside this board."
      - "JetBrains MCP was probed once and is unavailable for the active worktree because IntelliJ has the main checkout open, not this worktree."
      - "GoalBuddy Scout, Worker, and Judge agent files are not currently installed on this machine, so /goal may need PM fallback unless the agents are installed later."
    existing_plan_facts:
      - "Issue #119 title: Convert benchmark inventory and downstream smokes into executable release gates."
      - "Issue #119 source URL: https://github.com/tannerpolley/ePC-SAFT/issues/119"
      - "Issue #119 is open and had no comments when this board was created."
      - "Issue #119 exact task chain is benchmark fixture registry -> executable benchmark commands -> numeric tolerance checks -> downstream repository install tests -> real downstream workflow runs -> release-readiness report."
      - "Issue #119 owned paths are src/epcsaft/benchmarks, scripts/benchmarks, scripts/validation, tests/workflows/benchmarks, tests/api/package, tests/regression/literature, tests/fixtures/literature, analyses, docs/pages/downstream_local_installs.rst, docs/roadmaps/downstream_integration_report.md, and docs/roadmaps/release_benchmark_report.md."
      - "Issue #119 forbids behavior-changing edits under src/epcsaft/native, src/epcsaft/equilibrium.py, src/epcsaft/regression.py, and src/epcsaft/reactive_speciation.py except import or path fixes that do not change package behavior."
      - "Issue #119 required benchmark families include Gross/Sadowski neutral and associating baselines, Baygi MEA association, Cameretti/Held aqueous electrolyte density and MIAC, Held mixed-solvent density or osmotic or MIAC, Bulow/Ascani dielectric and Born behavior, Figiel 2025 modified Born / SSM / DS, Ascani 2022 distributed-ion electrolyte LLE, Ascani 2023 reactive phase equilibrium, Khudaida 2026 salting-out LLE, Rezaee lithium extraction inputs, and the MEA true-species pressure or speciation fixture."
      - "Issue #119 requires one real workflow run each in MEA-Thermodynamics, Lithium_Extraction, and MEA-Absorption-Column after installing local epcsaft."
      - "Issue #119 required final validation is scripts/benchmarks/benchmark_literature_suite.py, tests/workflows/benchmarks, tests/regression/literature, tests/api/package, validate_project quick, validate_project docs, and git diff --check."
      - "Issue #119 required reports are docs/roadmaps/release_benchmark_report.md and docs/roadmaps/downstream_integration_report.md."
      - "Board-prep branch: issue#119."
      - "Board-prep HEAD: 869e3354."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: missing
  worker: missing
  judge: missing

visual_board:
  selected: local
  local:
    status: live
    url: "http://127.0.0.1:41737/benchmark-release-gates/"
    command: "C:/Users/Tanner/Documents/git/codex-maintenance/scripts/start-goalbuddy-board.ps1 -Goal docs/goals/benchmark-release-gates"
