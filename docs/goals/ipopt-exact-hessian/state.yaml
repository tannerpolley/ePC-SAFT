version: 2

goal:
  title: "Ipopt Exact Hessian"
  slug: "ipopt-exact-hessian"
  kind: specific
  tranche: "Implement exact Hessians wherever currently feasible, centered on making electrolyte LLE work in exact-Hessian mode, adding the full derivative tier it requires where missing, and making default selection prefer exact on covered routes."
  status: done
  intake:
    original_request: "/goal Fully implement exact hessians everywhere possible with the explicit goal of getting it to work with electrolyte LLE and we can see how it improved."
    interpreted_outcome: "Electrolyte LLE and any other currently feasible public Ipopt routes gain verified exact-Hessian coverage, the full thermodynamic derivative tier required by electrolyte-LLE exact Hessians is implemented where missing, default route behavior prefers exact when a provider exists, and diagnostics clearly prove when exact versus limited-memory Hessians are used."
    input_shape: specific
    audience: "ePC-SAFT package maintainers and downstream generic-equilibrium users"
    authority: requested
    proof_type: test
    completion_proof: "Public/native electrolyte-LLE proof plus focused route tests show exact-Hessian execution and reporting on covered routes, uncovered routes still fail loudly under explicit exact requests, validation passes, cleanup passes, and the tranche is locally committed."
    likely_misfire: "Adapter diagnostics improve while electrolyte LLE still has no real Hessian provider, or exact mode becomes a hidden optional knob rather than a truthful default on covered routes."
    blind_spots_considered:
      - "Exact Hessians must be Hessians of the Lagrangian for the actual route NLP, not just objective-only second derivatives."
      - "Default selection must remain truthful and must not silently override an explicit user request."
      - "Electrolyte LLE is the success gate; broader route coverage is secondary."
      - "Electrolyte-LLE exact Hessians may require a full additional derivative tier, including higher-order EOS and association response data plus route-level implicit second-derivative propagation."
      - "The known freezing broad equilibrium sweep is not required evidence for this tranche."
      - "Pre-existing unrelated dirty files must stay outside this implementation slice."
    existing_plan_facts:
      - "The authoritative plan is docs/plans/ipopt_improvement_plan.md."
      - "The adapter already supports exact-Hessian callbacks, diagnostics, and loud rejection for uncovered NLPs."
      - "Current route tests still expect exact-Hessian rejection for electrolyte LLE and several other public route families."
      - "The branch is ipopt and currently ahead of origin/ipopt."
      - "The original goal already includes adding the full higher-order derivative tier required by electrolyte-LLE exact Hessians if that is what the route needs to work."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

