    audience: "ePC-SAFT package maintainers and downstream generic-equilibrium users"
    authority: requested
    proof_type: test
    completion_proof: "Provider diagnostics, accepted fixtures, captured Ipopt logs, focused validation, cleanup, and a local commit prove the modular default-exact route stack."
    likely_misfire: "A route gains another one-off Hessian implementation while shared derivative carriers and assembly remain incomplete."
    blind_spots_considered:
      - "The Hessian must be the route NLP Lagrangian Hessian, not just objective curvature."
      - "Transform second derivatives and nonlinear constraint multiplier terms are required where the route formulation uses them."
      - "Accepted fixtures are required route-family evidence; provider flags alone do not close the goal."
      - "The known broad equilibrium sweep hang is outside the completion gate."
      - "Repo text gates forbid committed wording that suggests surrogate derivative proof."

