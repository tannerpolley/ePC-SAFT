  intake:
    original_request: "PLEASE IMPLEMENT THIS PLAN: Modular Ipopt Exact-Hessian Refactor Plan"
    interpreted_outcome: "All native Ipopt equilibrium backend/internal route families use shared exact-Hessian infrastructure by default, accepted route fixtures prove the path, selected proof runs capture Ipopt logs, focused validation passes, cleanup passes, and changes are locally committed."
