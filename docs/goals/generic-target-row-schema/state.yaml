      - "Recommended generic target-row fields."
      - "Candidate implementation files."
      - "Verification commands."
    receipt:
      result: done
      summary: "Mapped the existing schema owner to src/epcsaft/regression.py, public exports to src/epcsaft/__init__.py, docs to docs/pages/parameter_regression.rst, and validation to tests/api/test_regression_problem_schema.py plus tests/api/test_regression_api.py."
      evidence:
        - "FitProblem and FitTerm already own generic regression contracts."
        - "No optimizer internals were required for schema-only TargetRow and TargetDataset."
  - id: T004
