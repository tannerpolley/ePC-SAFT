        - "src/epcsaft/__init__.py"
        - "tests/api/test_regression_problem_schema.py"
        - "tests/api/test_regression_api.py"
        - "tests/native/test_ceres_pure_regression.py"
        - "docs/pages/parameter_regression.rst"
  - id: T005
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: default
    objective: "Execute the first safe Task E implementation slice selected by Judge."
    allowed_files:
      - "src/epcsaft/regression.py"
      - "src/epcsaft/__init__.py"
      - "tests/api/test_regression_problem_schema.py"
      - "tests/api/test_regression_api.py"
      - "tests/native/test_ceres_pure_regression.py"
