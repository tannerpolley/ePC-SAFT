version: 2

goal:
  title: "Generic target-row and dataset schema"
  slug: "generic-target-row-schema"
  kind: existing_plan
  tranche: "Bounded watcher auto-run plus Task E implementation."
  status: done
  intake:
    original_request: "Run Goal Prep for Task E: Generic target-row and dataset schema."
    interpreted_outcome: "A GoalBuddy board exists for Task E, records the dependency gate, and blocks implementation until dependency A is satisfied."
    input_shape: existing_plan
    audience: "epcsaft package maintainers and future roadmap agents"
    authority: requested
    proof_type: artifact
    completion_proof: "TargetRow and TargetDataset schema contracts are implemented and the requested API/docs validation commands pass."
    likely_misfire: "Designing application-specific schemas or optimizer internals instead of generic package target-row contracts."
    blind_spots_considered:
      - "Dependency A is satisfied by PR #98 merged into origin/main."
      - "Bounded watcher auto-run uses auto_start_after_gate true."
      - "The package must remain application-neutral."
      - "No finite-difference derivative behavior is allowed."
    existing_plan_facts:
      - "Task key: E."
      - "Title: Generic target-row and dataset schema."
      - "Assigned branch: codex/generic-target-row-schema."
      - "Dependency: A."
      - "Prompt file: docs/roadmaps/agent_prompts/E_generic_target_row_and_dataset_schema.md."
      - "Validation commands: uv run python run_pytest.py tests/api/test_regression_problem_schema.py tests/api/test_regression_api.py -q; uv run python scripts/validate_project.py docs."
      - "Do not use PR #56 as a base."
      - "Do not add application-specific public APIs."
      - "No finite difference."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: generated
    url: null
    command: "node C:\\Users\\Tanner\\.codex\\skills\\goalbuddy\\extend\\local-goal-board\\scripts\\local-goal-board.mjs --goal docs/goals/generic-target-row-schema"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: null

tasks:
  - id: T001
    type: pm
    assignee: PM
    status: done
    reasoning_hint: medium
    objective: "Record dependency gate status for Task E and stop in PREPARED_WAITING while dependency A is unsatisfied."
    inputs:
      - "docs/roadmaps/agent_prompts/E_generic_target_row_and_dataset_schema.md"
      - "docs/roadmaps/agent_prompts/index.yaml"
      - "docs/roadmaps/agent_dependency_plan.md"
      - "docs/goals/generic-target-row-schema/notes/dependency_gate.yaml"
    constraints:
      - "Do not edit product/source files."
      - "Do not start implementation."
      - "Do not create local .worktrees/."
      - "Keep branch codex/generic-target-row-schema."
    expected_output:
      - "PREPARED_WAITING recorded."
      - "Dependency A evidence recorded."
      - "Next task remains blocked on dependency gate."
    receipt:
      result: done
      status: PREPARED_WAITING
      summary: "Goal Prep created the Task E board and dependency gate. Dependency A is not satisfied: GitHub issue #84 is open and no PR was found for branch codex/backend-coverage-hard-gate."
      evidence:
        - "https://github.com/tannerpolley/ePC-SAFT/issues/84"
        - "gh pr list --repo tannerpolley/ePC-SAFT --state all --head codex/backend-coverage-hard-gate returned []"
        - "origin/main at 639a9f8"
      next: "Recheck dependency A before any implementation."
  - id: T002
    type: pm
    assignee: PM
    status: done
    reasoning_hint: medium
    objective: "Re-run the dependency gate for Task E after dependency A may have changed."
    inputs:
      - "docs/goals/generic-target-row-schema/notes/dependency_gate.yaml"
      - "docs/roadmaps/agent_dependency_plan.md"
    constraints:
      - "No product/source edits."
      - "Run the gate commands before any implementation planning."
      - "Stop with BLOCKED_DEPENDENCY_OR_REBASE if dependency A is missing or the rebase conflicts."
    expected_output:
      - "PREPARED_WAITING or GATE_PASSED."
      - "Updated dependency_gate.yaml."
      - "Receipt with issue, PR, origin/main, branch, and rebase evidence."
    receipt:
      result: done
      status: PREPARED_WAITING
      summary: "Dependency gate rechecked. PR #98 for codex/backend-coverage-hard-gate is merged and origin/main contains merge commit 660ca5884821e9b693478bb9ca9bbdd8abe934b0, but dependency issue #84 is still open, so Task E must not start."
      evidence:
        - "Current branch: codex/generic-target-row-schema."
        - "Issue #84 state: OPEN."
        - "PR #98 state: MERGED."
        - "origin/main: 660ca5884821e9b693478bb9ca9bbdd8abe934b0."
      skipped:
        - "git rebase origin/main was not run because the issue dependency gate failed before implementation."
      next: "Recheck issue #84 closure before any Task E implementation."
  - id: T003
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: medium
    objective: "After the dependency gate passes, map existing regression schema/API surfaces and identify the smallest generic Task E implementation slice."
    inputs:
      - "Task E prompt"
