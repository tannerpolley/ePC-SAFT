version: 2

goal:
  title: "Native Phase-State Sensitivities For Electrolyte LLE"
  slug: "phase-state-sensitivities"
  kind: existing_plan
  tranche: "Build the derivative foundation required by parent issue #116 T017."
  status: done
  intake:
    original_request: "Unblock issue #116 production electrolyte LLE residual Jacobian and Ceres solve."
    interpreted_outcome: "A native phase-state sensitivity surface exists and is verified enough for the parent electrolyte LLE residual evaluator to build a real transformed-variable Jacobian."
    input_shape: existing_plan
    audience: "ePC-SAFT package maintainers"
    authority: inferred
    proof_type: test
    completion_proof: "Parent T017 can consume the child surface and report a real electrolyte LLE residual Jacobian without placeholder or manual numeric perturbation derivatives."
    likely_misfire: "Adding a diagnostic label or disconnected derivative helper that does not differentiate the actual residual state."
    blind_spots_considered:
      - "Density closure sensitivity may require implicit differentiation of the selected root."
      - "Fugacity sensitivity must include density and composition dependence."
      - "Association and electrolyte contributions may need analytic-implicit or CppAD-implicit handling."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true

agents:
  scout: installed
  worker: installed
  judge: installed

active_task: null

tasks:
  - id: T001
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Approve the smallest safe implementation package for native phase-state fugacity and density sensitivities."
    inputs:
      - "docs/goals/native-lle-reactive-production-solvers/notes/T018-sensitivity-map.md"
      - "src/epcsaft/native/epcsaft_density.cpp"
      - "src/epcsaft/native/epcsaft_fugcoef.cpp"
      - "src/epcsaft/native/epcsaft_mu.cpp"
      - "src/epcsaft/native/epcsaft_ares.cpp"
      - "src/epcsaft/native/epcsaft_equilibrium.cpp"
      - "tests/native/cppad/**"
    constraints:
      - "Do not implement."
      - "Reject any package that does not feed the actual electrolyte LLE residual state."
      - "Reject placeholder, stale, identity-only, or manual numeric perturbation derivatives."
    expected_output:
      - "Approved Worker allowed_files, verify commands, and stop conditions."
      - "Decision on fixed-density versus implicit-density first slice."
    receipt:
      result: done
      decision: implicit_density_first_slice
      summary: "Approved an implicit-density-first phase-state sensitivity Worker and rejected fixed-density-only support as insufficient for the parent electrolyte LLE residual state."
      artifacts:
        - "docs/goals/native-lle-reactive-production-solvers/subgoals/phase-state-sensitivities/notes/T001-implementation-boundary.md"
      evidence:
        - "Parent residual evaluation solves density before computing phase fugacity coefficients."
        - "Issue #116 requires the Jacobian of the actual transformed-variable residual state, not a fixed-density diagnostic surface."
        - "Existing CppAD explicit surfaces do not yet provide the complete pressure-based phase-state fugacity composition Jacobian."

  - id: T002
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "Implement the approved implicit-density native phase-state sensitivity surface slice for the actual phase-state fugacity path."
    allowed_files:
      - "src/epcsaft/native/epcsaft_core_internal.h"
      - "src/epcsaft/native/epcsaft_ares.cpp"
      - "src/epcsaft/native/epcsaft_Z.cpp"
      - "src/epcsaft/native/epcsaft_fugcoef.cpp"
      - "src/epcsaft/native/epcsaft_electrolyte.h"
      - "src/epcsaft/native/epcsaft_state.cpp"
      - "src/epcsaft/bindings.cpp"
      - "src/epcsaft/epcsaft.py"
      - "tests/native/cppad/**"
      - "tests/native/equilibrium/**"
      - "docs/goals/native-lle-reactive-production-solvers/subgoals/phase-state-sensitivities/notes/**"
    constraints:
      - "The sensitivity surface must differentiate the actual state used by electrolyte LLE residual evaluation."
      - "Diagnostics must label derivative backend and density-sensitivity scope honestly."
      - "Reject fixed-density-only support as completion for this slice."
      - "Do not differentiate through density iteration history."
      - "Do not use manually perturbed derivatives as production proof."
    verify:
      - "uv run python scripts/dev/build_epcsaft.py --profile full"
      - "uv run python run_pytest.py tests/native/cppad tests/native/equilibrium -q"
    stop_if:
      - "The implementation would require a broad EOS rewrite outside a reversible slice."
      - "Derivative proof depends on a manually perturbed derivative oracle."
      - "The surface cannot be wired to the same density/fugacity state used by `_evaluate_electrolyte_lle_residual_native`."
    receipt:
      result: done
      summary: "Implemented the first implicit-density native phase-state sensitivity surface for pressure-based non-associating states."
      changed_files:
        - "src/epcsaft/native/epcsaft_electrolyte.h"
        - "src/epcsaft/native/epcsaft_core_internal.h"
        - "src/epcsaft/native/epcsaft_ares.cpp"
        - "src/epcsaft/bindings.cpp"
        - "src/epcsaft/epcsaft.py"
        - "tests/native/cppad/test_phase_state_sensitivities.py"
        - "docs/goals/native-lle-reactive-production-solvers/subgoals/phase-state-sensitivities/notes/T002-phase-state-sensitivity-surface.md"
      evidence:
        - "The native surface solves the selected density root and applies the implicit pressure chain rule for composition sensitivities."
        - "The returned payload includes density sensitivity, fixed-density pressure-composition terms, fixed-density fugacity Jacobian, and total fugacity Jacobian."
        - "Active association remains an explicit follow-up gate, so parent T017 is still blocked."
      commands:
        - cmd: "uv run python scripts/dev/build_epcsaft.py --profile full"
          status: pass
        - cmd: "uv run python run_pytest.py tests/native/cppad/test_phase_state_sensitivities.py -q"
          status: pass
        - cmd: "uv run python run_pytest.py tests/native/cppad tests/native/equilibrium -q"
          status: pass
        - cmd: "git diff --check"
          status: pass

