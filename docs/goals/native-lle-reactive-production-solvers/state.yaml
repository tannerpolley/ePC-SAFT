      - "uv run python scripts/dev/validate_project.py docs"
      - "git diff --check"
      - "rg \"native_derivative_free_nelder_mead|not_required.*phase split solve|newton_step\\(.*not_available|reactive_staged_equilibrium\" src tests docs"
    stop_if:
