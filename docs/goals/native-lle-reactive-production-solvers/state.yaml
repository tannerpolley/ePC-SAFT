version: 2

goal:
  title: "Native LLE and Reactive Production Solvers"
  slug: "native-lle-reactive-production-solvers"
  kind: existing_plan
  tranche: "Execute GitHub issues #116 and #117 as a dependency-gated production-solver implementation tranche."
  status: done
  intake:
    original_request: "Read issue #116 and #117 on GitHub and set up a GoalBuddy board for all phases to follow issue #116 and #117 explicitly in all of its steps."
    interpreted_outcome: "A GoalBuddy board exists that operationalizes every phase of issues #116 and #117, with #117 gated behind #116 and with explicit proof requirements."
    input_shape: existing_plan
    audience: "ePC-SAFT package maintainers and downstream consumers"
    authority: requested
    proof_type: artifact
    completion_proof: "Final audit maps completed receipts and passing validation back to every definition-of-done line in GitHub issues #116 and #117."
    likely_misfire: "Treating inventory, diagnostics, staged routes, synthetic fixtures, capability labels, or limitation notes as completion."
    blind_spots_considered:
      - "Dependency PR ancestry and current origin/main state must be verified before source edits."
      - "Issue #117 depends on issue #116 production solver completion unless both are implemented in one branch with #116 first."
      - "Goal and source text must avoid exact banned backend-policy tokens from the master roadmap."
      - "Public APIs must remain generic and must not expose downstream application metrics."
    existing_plan_facts:
      - "Issue #116: replace hand-coded electrolyte LLE minimizers with a Ceres trust-region residual solve on transformed variables."
      - "Issue #116: production route must report residuals, charge balance, material balance, phase distance, and derivative provenance from solved state."
      - "Issue #116: required stages are dependency gate, intake, native solver ownership, distributed-ion basis, transformed variables, residual vector, Jacobian, Ceres solve, TPD/g-hat use, Python API, benchmarks/tests, validation, and definition-of-done audit."
      - "Issue #117: replace staged reactive phase equilibrium with one coupled native reactive phase-equilibrium residual solve."
      - "Issue #117: required stages are dependency gate, intake, native solver ownership, coupled variables, coupled residual vector, Jacobian and solved-state sensitivities, Ceres solve, use of #115/#116 only as subcomponents, Python API, benchmarks, tests, validation, and definition-of-done audit."
      - "GitHub sources read: https://github.com/tannerpolley/ePC-SAFT/issues/116 and https://github.com/tannerpolley/ePC-SAFT/issues/117."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://127.0.0.1:41737/native-lle-reactive-production-solvers/"
    command: "C:\\Users\\Tanner\\Documents\\git\\codex-maintenance\\scripts\\start-goalbuddy-board.ps1 -Goal docs/goals/native-lle-reactive-production-solvers"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: null

tasks:
  - id: T001
    type: pm
    assignee: PM
    status: done
    reasoning_hint: high
    objective: "Perform the shared dependency gate and create the exact issue-required intake notes before any source edits."
    inputs:
      - "GitHub issue #116"
      - "GitHub issue #117"
      - "docs/roadmaps/FULL_ROADMAP.md"
      - "git fetch origin --prune"
      - "git merge --ff-only origin/main"
      - "git status --short"
    constraints:
      - "May edit only docs/goals/native-lle-reactive-production-solvers/**, docs/goals/native-electrolyte-lle-distributed-ions/notes/intake.md, docs/goals/native-coupled-reactive-lle/notes/dependency_gate.md, and docs/goals/native-coupled-reactive-lle/notes/intake.md."
      - "No source, test, build, API, or benchmark edits before the issue-required intake notes are complete."
      - "Record origin/main SHA, current branch, dependency PR ancestry, current production routes, old solver labels/routes, missing Jacobian behavior, and chosen fixtures."
      - "If the branch cannot fast-forward to origin/main, stop implementation and record the blocker."
    expected_output:
      - "docs/goals/native-electrolyte-lle-distributed-ions/notes/intake.md completed for issue #116 Stage 0."
      - "docs/goals/native-coupled-reactive-lle/notes/dependency_gate.md completed for issue #117 dependency gate."
      - "docs/goals/native-coupled-reactive-lle/notes/intake.md completed for issue #117 Stage 0."
      - "Receipt with origin/main SHA, branch, dependency status, selected fixtures, and source-edit gate status."
    receipt:
      result: done
      summary: "Dependency gate passed and issue-required intake notes were written before any source edits."
      artifacts:
        - "docs/goals/native-electrolyte-lle-distributed-ions/notes/intake.md"
        - "docs/goals/native-coupled-reactive-lle/notes/dependency_gate.md"
        - "docs/goals/native-coupled-reactive-lle/notes/intake.md"
      evidence:
        - "Branch `#116-117` at `4f1efb046b4614e9a941ded5371349d9246924bd`; origin/main at `f3ce3cc332bc06e8504ece122e478c8396bc27b8`."
        - "`git fetch origin --prune` completed and `git merge --ff-only origin/main` reported already up to date."
        - "PR #123, #124, and #125 merge commits were verified as ancestors of HEAD."
        - "Current electrolyte LLE production route maps through `src/epcsaft/equilibrium.py` and native `epcsaft_equilibrium.cpp`; `src/epcsaft/electrolyte_lle.py` is absent."
        - "Current reactive LLE route is staged and remains gated behind issue #116 completion."
      commands:
        - "gh issue view 116 --repo tannerpolley/ePC-SAFT --json number,title,state,url,updatedAt,body"
        - "gh issue view 117 --repo tannerpolley/ePC-SAFT --json number,title,state,url,updatedAt,body"
        - "git fetch origin --prune"
        - "git merge --ff-only origin/main"
        - "git status --short"
        - "git merge-base --is-ancestor <PR123|PR124|PR125 merge commit> HEAD"

  - id: T002
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: medium
    objective: "Map issue #116 current electrolyte LLE routes, solver labels, hand-coded minimizer paths, residual/Jacobian gaps, Python API path, and tests that would still pass on the old route."
    inputs:
      - "src/epcsaft/native/epcsaft_equilibrium.cpp"
      - "src/epcsaft/native/epcsaft_equilibrium.h"
      - "src/epcsaft/equilibrium.py"
      - "src/epcsaft/electrolyte_lle.py"
      - "tests/equilibrium/electrolyte/"
      - "tests/native/equilibrium/"
    constraints:
      - "Read-only."
      - "Use issue #116 stage names and report concrete file/function evidence."
      - "Do not propose completion by inventory or diagnostics."
    expected_output:
      - "Current neutral and electrolyte LLE production route evidence."
      - "All hand-coded simplex/Powell/Nelder-Mead-style helpers found."
      - "Current newton_step behavior and electrolyte residual sensitivity gaps."
      - "Candidate Ascani-style and salting-out fixtures."
      - "Candidate next Worker package boundaries."
    receipt:
      result: done
      summary: "Mapped issue #116 current public/native routes, hand-coded optimizer paths, residual sensitivity gaps, and fixtures."
      artifacts:
        - "docs/goals/native-lle-reactive-production-solvers/notes/T002-issue-116-route-map.md"
      evidence:
        - "`ElectrolyteLLEProblem.solve` delegates to `mixture.electrolyte_lle_tp(...)`; native route enters `_call_native_equilibrium(kind=\"electrolyte_lle\", ...)`."
        - "`minimize_lle_residual_variables`, `polish_formula_tpd_variables`, `nelder_mead_variables`, and `solve_lle_attempt` are old hand-coded optimizer paths that cannot remain accepted production behavior."
        - "`newton_step` and `_evaluate_electrolyte_lle_residual_native` currently report unavailable electrolyte residual sensitivities."
        - "Ascani-style, Khudaida 2026 salting-out, and optional Hubach 2024 hard-case fixtures were identified."
      commands:
        - "rg -n \"ElectrolyteLLEProblem|electrolyte_lle_flash_native|build_electrolyte_basis_native|newton_step|_evaluate_electrolyte_lle_residual_native\" src tests"
        - "rg -n \"minimize_lle_residual_variables|polish_formula_tpd_variables|nelder_mead_variables|solve_lle_attempt\" src/epcsaft/native/epcsaft_equilibrium.cpp"

  - id: T003
