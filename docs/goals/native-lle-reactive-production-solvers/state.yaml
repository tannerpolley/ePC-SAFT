      commands:
        - "uv run python -c \"import epcsaft, json; print(json.dumps(epcsaft.runtime_build_info()['optional_dependencies'], indent=2))\""
        - "rg -n \"EPCSAFT_ENABLE_CERES|ceres|CppAD|jacobian_backend|jacobian_available\" src/epcsaft/native CMakeLists.txt scripts/dev tests/native"

