      summary: "Stopped before T005 source edits because the native code lacks a trustworthy electrolyte LLE residual/Jacobian surface for transformed variables."
      blocker: "A real production Jacobian cannot be made from the current electrolyte LLE residual route without a boundary decision on CppAD or implicit sensitivity ownership."
