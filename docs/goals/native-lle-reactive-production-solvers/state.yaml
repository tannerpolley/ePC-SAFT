      evidence:
        - "Current runtime build info reports CppAD compiled and Ceres disabled in the fast local build."
        - "Ceres support is present for native regression, not for electrolyte LLE phase-equilibrium residuals."
        - "`newton_step` and `_evaluate_electrolyte_lle_residual_native` still report unavailable electrolyte LLE residual sensitivities."
        - "Existing native derivative surfaces do not expose a complete residual/Jacobian for transformed electrolyte LLE variables, density closure, and fugacity residuals."
      stop_if_triggered:
