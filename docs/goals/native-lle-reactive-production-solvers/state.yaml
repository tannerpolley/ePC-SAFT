      - "Represent public species explicitly, including ions; formula variables may be only coordinates."
      - "Add diagnostics for variable_model, basis_rank, basis_vectors, charged and neutral species indices, and phase charge balances."
      - "Reject infeasible transformed candidates before accepted reporting."
    verify:
      - "uv run python run_pytest.py tests/native/equilibrium -q"
    stop_if:
      - "Need source files outside allowed_files."
      - "Cannot satisfy electroneutral independent ion-combination basis."
      - "Transform cannot enforce or diagnose material and charge balance."
      - "Verification fails twice for the same unexplained reason."
    receipt:
      result: done
      summary: "Implemented issue #116 Stages 1-3 basis and transformed-variable diagnostics in the native electrolyte LLE route."
      changed_files:
        - "src/epcsaft/native/epcsaft_equilibrium.cpp"
        - "tests/native/equilibrium/test_electrolyte_lle_native_diagnostics.py"
        - "docs/goals/native-electrolyte-lle-distributed-ions/notes/variable_transform.md"
      evidence:
        - "Native electrolyte LLE now reports basis_model, basis_vector_model, species index groups, species charge vector, row-major public-species basis vectors, formula feed, salt-pair stoichiometry, and transform guarantee flags."
