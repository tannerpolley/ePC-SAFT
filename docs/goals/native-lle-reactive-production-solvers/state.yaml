          status: pass
        - cmd: "uv run python run_pytest.py tests/api/equilibrium/test_electrolyte_lle_problem_production_route.py -q"
          status: pass
        - cmd: "uv run python run_pytest.py tests/native/equilibrium -q"
          status: pass
        - cmd: "git diff --check"
