        - "The Ceres residual solve and production Jacobian remain intentionally queued for T005."
      commands:
        - cmd: "uv run python scripts/dev/build_epcsaft.py"
          status: pass
        - cmd: "uv run python run_pytest.py tests/native/equilibrium/test_electrolyte_lle_native_diagnostics.py -q"
          status: pass
        - cmd: "uv run python run_pytest.py tests/equilibrium/electrolyte/test_electrolyte_lle_results.py::test_mixed_electrolyte_lle_reports_phase_charge_balance_for_distributed_ions -q"
          status: pass
        - cmd: "uv run python run_pytest.py tests/native/equilibrium -q"
          status: pass

