        - "T006 must wire the generic Python route and distributed-ion plus salting-out benchmark tests."
        - "T007 must run route guards and the issue #116 validation ladder before T008 can unlock #117."
      commands: []

  - id: T004
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "Implement issue #116 Stages 1-3: native electrolyte LLE solver ownership, distributed-ion basis, diagnostics basis report, and transformed feasible variables."
    allowed_files:
