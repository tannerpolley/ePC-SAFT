    type: worker
    assignee: Worker
    status: blocked
    reasoning_hint: high
    objective: "Implement issue #116 Stages 4-6: electrolyte LLE residual blocks, scaled norms, production Jacobian, and Ceres trust-region residual solve."
    allowed_files:
      - "src/epcsaft/native/epcsaft_equilibrium.cpp"
      - "src/epcsaft/native/epcsaft_equilibrium.h"
      - "src/epcsaft/native/equilibrium/**"
      - "tests/native/equilibrium/test_electrolyte_lle_ceres_solver.py"
