version: 2

goal:
  title: "Ipopt Explicit Density"
  slug: "ipopt-explicit-density"
  kind: specific
  tranche: "Remove internal pressure-root density solves from native Ipopt equilibrium evaluations wherever density can and should be represented as an explicit NLP variable."
  status: active
  intake:
    original_request: "/goal Make explicit density for the remaining pressure-root/stability/reactive paths and dont lift association X_A yet."
    interpreted_outcome: "Native Ipopt equilibrium routes use explicit density or volume variables instead of pressure-root density solves inside callbacks wherever that formulation is appropriate, while normal state/property pressure-root calls remain unchanged."
    input_shape: specific
    audience: "ePC-SAFT package maintainers and downstream generic-equilibrium users"
    authority: requested
    proof_type: test
    completion_proof: "Route audit, code tests, accepted exact-Hessian route fixtures, focused validation, cleanup, and a local commit prove all eligible Ipopt paths no longer perform internal density-root solves."
    likely_misfire: "Only seed construction changes while stability or reactive Ipopt callbacks still solve density internally at every evaluation."
    blind_spots_considered:
      - "Two-phase EOS routes already use phase volume variables, so the goal is not to rewrite those unnecessarily."
      - "Pressure-root density remains valid for normal state/property calls outside Ipopt."
      - "Association site fractions are not lifted into the NLP in this tranche."
      - "Explicit density requires pressure consistency constraints and exact Hessian terms."
      - "The known broad equilibrium sweep hang is not a required validation gate."
    existing_plan_facts:
      - "The previous modular exact-Hessian tranche completed shared Lagrangian assembly and default exact route coverage."
      - "The user wants explicit density prioritized before association implicit improvements."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

