  slug: "package-clutter-pruning"
  kind: existing_plan
  tranche: "Execute issue #120 phases in order, preserving scientific behavior and producing PR-ready evidence."
  status: active
  intake:
    original_request: "Read issue #120 on Github and set up a GoalBuddy board for all phases, following the issue explicitly."
    interpreted_outcome: "A phase-complete GoalBuddy board exists for issue #120 with queued Scout, Judge, Worker, and PM tasks ready for cleanup execution."
    input_shape: existing_plan
    audience: "Future ePC-SAFT cleanup agents and the package maintainer."
    authority: requested
    proof_type: artifact
    completion_proof: "docs/goals/package-clutter-pruning/goal.md and state.yaml validate, include every issue #120 phase, and preserve issue constraints."
    likely_misfire: "Treating cleanup planning or inventories as completion, or using this cleanup issue to start #114-#119 vertical implementation work."
    blind_spots_considered:
      - "Baseline validation may already be red; Phase 0 must record failures and continue only when unrelated to cleanup."
      - "Runtime imports may be public by accident; compatibility shims must be temporary and explicit."
      - "Native rebuilds must be coordinated by the main thread because _core artifacts can be locked by Python, tests, IDEs, or agents."
      - "Documentation and code wording must not imply staged or debug routes satisfy production workflows."
    existing_plan_facts:
      - "Issue #120 body defines cleanup scope, non-goals, deliverables, validation, and definition of done."
      - "Issue comment 4456462579 defines Phase 0 through Phase 9 execution sequence and final PR checklist."
      - "Goal root requested by issue comment: docs/goals/package-clutter-pruning."
      - "Current prep branch at board creation: codex/package-cleanup."
      - "Current prep base at board creation: origin/main and local main both point at 8f0ea57."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: false
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

