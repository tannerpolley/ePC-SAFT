version: 2

goal:
  title: "Literature Benchmark Suite"
  slug: "literature-benchmark-suite"
  kind: existing_plan
  tranche: "inventory the benchmark surface first, then execute successive safe generic benchmark slices until the full original outcome is complete"
  status: done
  intake:
    original_request: "Task L: Literature benchmark suite."
    interpreted_outcome: "Prepare and execute a generic literature benchmark tranche for package-level confidence on the assigned branch."
    input_shape: existing_plan
    audience: package maintainers and downstream users
    authority: requested
    proof_type: artifact
    completion_proof: "The prepared GoalBuddy board, issue scope note, and later verification receipts show the literature benchmark suite has been implemented without application-specific public APIs."
    likely_misfire: "Start implementing benchmark code before the dependency gate is recorded, narrow the suite to a single downstream application, or introduce application-specific APIs."
    blind_spots_considered:
      - "Implementation may need to wait on upstream solver or regression work even though the issue lists no explicit dependencies."
      - "Benchmarks must remain generic and package-owned."
      - "Any blocked item should be recorded rather than silently skipped."
    existing_plan_facts:
      - "Assigned branch: codex/literature-benchmark-suite"
      - "GitHub issue: #95"
      - "Dependency list in the issue body: none"
      - "Local live GoalBuddy board requested"
      - "No local .worktrees/"
      - "No finite difference"
      - "No application-specific public APIs"
      - "Validation commands: uv run python scripts/validate_project.py docs; uv run python run_pytest.py tests/regression/test_literature_pure_parameter_regression.py tests/regression/test_literature_binary_kij_regression.py tests/regression/test_figiel_2025_born_parameter_parity.py -q"
      - "Focused PR must include Closes #95"

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true

agents:
  scout: unknown
  worker: unknown
  judge: unknown

visual_board:
  selected: local
  local:
    status: live
    url: "http://127.0.0.1:41737/literature-benchmark-suite/"
    command: "node C:\\Users\\Tanner\\.codex\\plugins\\cache\\goalbuddy\\goalbuddy\\0.3.6\\skills\\goalbuddy\\extend\\local-goal-board\\scripts\\local-goal-board.mjs --goal docs/goals/literature-benchmark-suite --host 127.0.0.1"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: default
    objective: "Inventory the current literature benchmark surface, confirm the dependency gate, and map the in-scope benchmarks to existing files, tests, and gaps."
    inputs:
      - "docs/roadmaps/general_reactive_electrolyte_equilibrium_readiness.md"
      - "docs/roadmaps/agent_dependency_plan.md"
      - "docs/roadmaps/agent_prompts/index.yaml"
      - "docs/goals/literature-benchmark-suite/notes/issue_scope.md"
      - "tests/regression"
    constraints:
      - "Read-only."
      - "Do not edit implementation files."
      - "Do not introduce application-specific APIs."
      - "Prefer concrete file-path evidence over generic advice."
    expected_output:
      - "Inventory of literature benchmark coverage"
      - "Gap list"
      - "Dependency gate result"
      - "Candidate first safe implementation slice"
    receipt:
      result: done
      note: notes/T001-scout-inventory.md
      summary: "Inventory complete. Existing literature coverage is fragmented; several anchors are already tested, but the repo lacks a package-owned literature-suite manifest/runner and still exposes MEA-specific regression coverage through an application-specific public helper."
  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: default
    objective: "Review the inventory and choose the first safe generic benchmark slice that stays within the package-scope rule."
    inputs:
      - "T001 receipt"
    constraints:
      - "Do not implement."
      - "Do not narrow the prompt scope silently."
    expected_output:
      - "Decision"
      - "Exact Worker objective"
      - "allowed_files"
      - "verify"
      - "stop_if"
      - "Blocked or deferred items"
    receipt:
      result: done
      decision: "Implement a package-owned literature-suite manifest and CLI/tests first, then document the suite entrypoint before attempting any MEA-specific helper cleanup."
      next_allowed_task: T003
      allowed_files:
        - "src/epcsaft/benchmarks/__init__.py"
        - "src/epcsaft/benchmarks/literature.py"
        - "scripts/benchmark_literature_suite.py"
        - "tests/workflows/test_benchmark_literature_suite.py"
      note: notes/T002-worker-slice-decision.md
      summary: "Selected a bounded first slice: build a package-owned literature-suite manifest and CLI/tests that classify the full issue scope without adding new application-specific APIs or pretending blocked benchmark routes are implemented."
  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: default
    objective: "Execute the first safe benchmark slice selected by Judge."
    allowed_files:
      - "src/epcsaft/benchmarks/__init__.py"
      - "src/epcsaft/benchmarks/literature.py"
      - "scripts/benchmark_literature_suite.py"
      - "tests/workflows/test_benchmark_literature_suite.py"
