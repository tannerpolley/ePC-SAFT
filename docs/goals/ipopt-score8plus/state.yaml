version: 2

goal:
  title: "Ipopt Score 8 Plus"
  slug: "ipopt-score8plus"
  kind: existing_plan
  tranche: "Complete the remaining score-8.x Ipopt improvement-plan items after the finished tranche-1 board."
  status: done
  intake:
    original_request: "/goal Now implement all the ipopt changes from the document that have a score of 8 or higher"
    interpreted_outcome: "The remaining score-8.x Ipopt improvements are implemented, tested, and locally committed on top of the completed tranche-1 work."
    input_shape: existing_plan
    audience: "ePC-SAFT package maintainers and downstream consumers"
    authority: requested
    proof_type: test
    completion_proof: "Focused and broad tests prove route-owned initial-point strategy, linear-solver/tolerance controls, and sparse Jacobian behavior; cleanup passes; tracked changes are locally committed."
    likely_misfire: "The adapter exposes more knobs while route behavior remains unchanged, or score-8.x items are claimed complete without sparse Jacobian, initial-point, and tolerance-family proof."
    blind_spots_considered:
      - "Tranche 1 is already complete and should not be reopened unless regression evidence demands it."
      - "Sparse Jacobian work must stay route-aware rather than pretending all NLPs share one pattern."
      - "Initial-point strategy must be generic across route families, not a one-off hard-case patch."
      - "Linear-solver exposure must reject unavailable backends loudly and report the selected backend."
      - "Tolerance-family exposure must preserve package postsolve acceptance gates instead of treating Ipopt status alone as success."
    existing_plan_facts:
      - "The plan document is docs/plans/ipopt_improvement_plan.md."
      - "Score >= 9.0 tranche work is already complete on branch ipopt."
      - "Remaining score >= 8.0 items are initial-point strategy, linear solver selection/reporting, sparse Jacobian structures, and separate tolerance families."
      - "No capability or documentation overclaim is allowed."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: generated
    url: "http://127.0.0.1:41737/ipopt-score8plus/"
    command: "& C:\\Users\\Tanner\\Documents\\git\\codex-maintenance\\scripts\\start-goalbuddy-board.ps1 -Goal docs/goals/ipopt-score8plus -Once -Json"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: medium
    objective: "Map the current score-8.x Ipopt feature gaps across adapter, route builders, public wrappers, and tests."
    inputs:
      - "docs/plans/ipopt_improvement_plan.md"
      - "docs/goals/ipopt-tranche1/state.yaml"
      - "src/epcsaft/native/equilibrium_nlp/"
      - "src/epcsaft/equilibrium.py"
      - "src/epcsaft/reactive_speciation.py"
      - "tests/native/equilibrium/"
      - "tests/equilibrium/"
      - "tests/api/reactive/"
    constraints:
      - "Read-only."
      - "Identify the smallest set of write surfaces that can complete the remaining score-8.x items."
    expected_output:
      - "gap map by feature"
      - "first safe worker slice"
      - "verification plan"
    receipt:
      result: done
      summary: "The remaining score-8.x gaps were mapped. Public/native controls for separate Ipopt tolerance families and linear-solver selection are missing, while the route builders still use single deterministic initial points and several major NLPs still advertise dense Jacobian structures."
      evidence:
        - "EquilibriumOptions and ReactiveSpeciationOptions currently expose only one Ipopt tolerance plus hessian_mode/history/continuation controls."
        - "ipopt_adapter.cpp sets tol and acceptable_tol but not dual_inf_tol, constr_viol_tol, compl_inf_tol, or linear_solver."
        - "NeutralTwoPhaseEosProblem, ReactiveTwoPhaseEosProblem, and bubble/dew NLPs still return dense row/column Jacobian structures."
        - "Two-phase route builders still initialize from one deterministic shifted-feed seed unless a continuation_state is supplied."
      spawned_tasks:
        - T010
        - T020
        - T030

