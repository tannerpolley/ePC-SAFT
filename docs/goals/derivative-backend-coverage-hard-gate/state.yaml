          summary: "7 passed in 0.72s"
        - cmd: "uv run python run_pytest.py tests/api/test_runtime_capabilities_dependency_gates.py -q"
          status: pass
          summary: "6 passed in 0.42s"
      summary: "Added explicit hard-gate classifications to state-level derivative coverage rows and runtime coverage rows, added runtime row_family metadata, and tested classification semantics."
  - id: T005
