version: 2

goal:
  title: "Ipopt Tranche 1"
  slug: "ipopt-tranche1"
  kind: existing_plan
  tranche: "Implement per-iteration diagnostics, scaling diagnostics, warm-start continuation state, and Hessian-mode behavior for native Ipopt equilibrium routes."
  status: active
  intake:
    original_request: "PLEASE IMPLEMENT THIS PLAN: Ipopt Tranche 1 Shipshape Prep"
    interpreted_outcome: "The score >= 9.0 Ipopt improvements are implemented, tested, and locally committed without branch-prune side effects."
    input_shape: existing_plan
    audience: "ePC-SAFT package maintainers and downstream consumers"
    authority: requested
    proof_type: test
    completion_proof: "Focused native/Python tests pass, Ipopt-enabled proof is run or blocked with exact reason, cleanup passes, and tracked tranche changes are locally committed."
    likely_misfire: "Diagnostics or option names are added without changing the native Ipopt adapter behavior, or exact Hessian requests silently fall back to limited-memory."
    blind_spots_considered:
      - "Exact Ipopt Hessian support requires Hessian-of-Lagrangian callbacks."
      - "Fast dev builds do not prove native Ipopt behavior."
      - "Route-level exact Hessian coverage may be uneven; exact mode must fail loudly when unavailable."
      - "Continuation state must be route-compatible by route kind, dimensions, species order, and fixed specs."
      - "Generated Graphify output should stay local/untracked by default."
      - "Algorithm-registry branch/worktree cleanup is no longer part of this plan."
    existing_plan_facts:
      - "Implement score >= 9.0 items only: scaling, exact Hessian support, per-iteration diagnostics, and warm starts."
      - "Recommended implementation order: diagnostics, scaling, warm starts, exact Hessian support."
      - "Add typed public options: ipopt_iteration_history_limit, hessian_mode, continuation_state."
      - "Preserve limited-memory as explicit selectable mode."
      - "Default hessian_mode='auto' may select exact only when the route has verified Hessian coverage."
      - "No branch pruning is part of this tranche."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

