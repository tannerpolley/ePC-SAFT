  selected: local
  local:
    status: generated
    url: "http://127.0.0.1:41737/ipopt-tranche1/"
    command: "& C:\\Users\\Tanner\\Documents\\git\\codex-maintenance\\scripts\\start-goalbuddy-board.ps1 -Goal docs/goals/ipopt-tranche1 -Once -Json"
