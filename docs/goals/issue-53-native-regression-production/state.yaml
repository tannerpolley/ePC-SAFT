# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Issue #53 native regression production stack"
  slug: "issue-53-native-regression-production"
  kind: existing_plan
  tranche: "Continue issue #53 after GitHub comment 4424893353: preserve the current branch as Phase 0 contract groundwork, then implement the true native Ceres/CppAD thermodynamic row hot loop with finite differences debug-only."
  status: active
  intake:
    original_request: "Prep to fully implement the new issue posted as issue #53 and implement subagent to achieve all the different aspects and scopes of the plan."
    interpreted_outcome: "Prepare a GoalBuddy execution board that decomposes GitHub issue #53 into safe, delegated implementation lanes and finishes with validation, PR, merge, and issue closure."
    input_shape: existing_plan
    audience: "ePC-SAFT package users, downstream MEA-Thermodynamics workflows, and future package maintainers"
    authority: requested
    proof_type: test
    completion_proof: "Issue #53 definition of done is satisfied with native regression code, production derivative policy, tests, benchmarks, docs, PR evidence, passing checks, and no public bounded_incomplete status."
    likely_misfire: "Only adding CMake flags or docs while production fitting still uses Python/SciPy/finite differences or while native Ceres/CppAD is only a placeholder."
    blind_spots_considered:
      - "Ceres and CppAD dependency setup may be the largest Windows/uv/Python 3.13 risk."
      - "Full templating of all EOS kernels may be too broad for one pass; a minimum viable native regression slice needs Judge approval."
      - "Implicit sensitivity through nested speciation and bubble solves is mathematically hard and may require a staged native derivative policy."
      - "The existing issue #51 Python-orchestrated fit path must remain available only as compatibility/debug if production native backend is ready."
      - "Benchmark fixtures must prove pressure/speciation residuals, Born/SSM+DS coverage, and at least one k_ij path without private downstream files."
    existing_plan_facts:
      - "GitHub issue #53: https://github.com/tannerpolley/ePC-SAFT/issues/53"
      - "GitHub comment 4424893353: https://github.com/tannerpolley/ePC-SAFT/issues/53#issuecomment-4424893353"
      - "The current branch is only a Phase 0 / native residual-record contract slice unless the next tranche is implemented."
      - "Continue on branch codex/issue-53-native-regression-production; do not fork a new native-Ceres branch unless a later Judge task changes this."
      - "Do not open a completion PR before T022; any earlier PR must be draft-only and framed as Phase 0 native residual-record groundwork."
      - "Do not merge or describe the current branch as completing #53 while issue53_native_production_ready=false, native_hot_loop=false, Python packs/evaluates mixed pressure/speciation thermodynamic rows, Ceres does not execute the production parameter solve loop, or CppAD is not package-wide."
      - "Issue #53 asks for Ceres as primary robust bounded nonlinear least-squares backend."
      - "Issue #53 asks for CppAD as package-wide AD substrate."
      - "Issue #53 keeps native IPOPT full NLP optional/future."
      - "Production fitting must not depend on Python scipy.optimize, Python loops as optimizer, or Python finite-difference Jacobians."
      - "Public results must not emit bounded_incomplete."
      - "The target workflow is bounded mixed pressure/speciation reactive electrolyte regression for MEA-like systems with SSM+DS Born terms."
      - "Required benchmark script: scripts/benchmark_native_regression.py."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true

agents:
  scout: installed
  judge: installed
  worker: installed

active_task: T032

