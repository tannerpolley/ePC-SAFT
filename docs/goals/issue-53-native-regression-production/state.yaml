      summary: "Current branch has no implementation delta against main for Issue #53. Reactive regression still optimizes in Python with finite-difference Jacobians; Ceres is only default-off build plumbing for equilibrium; CppAD and native reactive-regression solve entrypoints are absent. The minimum viable slice is a one-shot native Ceres reactive regression backend with fixed-shape residuals, full statuses, and Python marshalling only."
