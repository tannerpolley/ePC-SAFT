        - command: "uv run python run_pytest.py tests/equilibrium/test_electrolyte_lle.py tests/native/test_cppad_lle_derivatives.py -q"
          status: pass
        - command: "uv run python scripts/validate_project.py quick"
          status: pass
        - command: "git diff --check"
