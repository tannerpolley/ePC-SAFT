      status: IMPLEMENTED
      summary: "Added downstream integration smoke tests and documented the generic downstream contract without package source changes, application-specific public APIs, or finite-difference routes."
      evidence:
        - "tests/api/test_downstream_integration_smokes.py"
        - "docs/pages/downstream_local_installs.rst"
