      - "Dependency gate evidence recorded."
      - "Next task remains blocked on dependency gate."
    receipt:
      result: done
      status: GATE_PASS
      summary: "The bounded watcher returned GATE_PASS after dependency issues #89, #90, #92, #93, and #94 closed and their required PRs merged. Implementation is unblocked."
      evidence:
        - "docs/goals/downstream-integration-smokes/notes/dependency_gate.yaml"
        - "powershell.exe -NoProfile -ExecutionPolicy Bypass -File docs/goals/downstream-integration-smokes/notes/watch_dependency.ps1 -> GATE_PASS"
        - "PR #105 merged for dependency F."
        - "PR #106 merged for dependency G."
        - "PR #110 merged for dependency I."
        - "PR #111 merged for dependency J."
        - "PR #108 merged for dependency K."
      next: "Implement Task M downstream integration smoke tests."

  - id: T002
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Implement Task M downstream integration smoke coverage using existing generic epcsaft APIs only."
    inputs:
      - "docs/roadmaps/agent_prompts/M_downstream_integration_smoke_tests.md"
      - "docs/goals/downstream-integration-smokes/notes/issue_scope.md"
      - "src/epcsaft/__init__.py"
      - "src/epcsaft/equilibrium.py"
      - "src/epcsaft/regression.py"
      - "src/epcsaft/reactive_speciation.py"
    constraints:
      - "Do not add application-specific public APIs."
      - "Do not add finite-difference derivative routes."
      - "Do not compute downstream-specific metrics inside epcsaft."
      - "Do not create local .worktrees/."
    verify:
      - "uv run pytest tests/api/test_downstream_integration_smokes.py -q"
      - "uv run python scripts/validate_project.py quick"
      - "uv run python scripts/validate_project.py docs"
