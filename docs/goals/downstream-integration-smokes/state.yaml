          status: pass
        - cmd: "uv run pytest tests/equilibrium/test_lle.py::test_methanol_cyclohexane_lle_flash_solves_seeded_phase_split -q"
          status: pass
        - cmd: "uv run python scripts/validate_project.py quick"
          status: pass
        - cmd: "uv run python scripts/validate_project.py docs"
          status: pass
        - cmd: "git diff --check"
          status: pass
      next: "Commit, open a focused draft PR, self-review, and run GitHub merge gates."

  - id: T003
    type: pm
    assignee: PM
    status: active
    reasoning_hint: medium
    objective: "Publish the Task M branch, create/review the PR, and complete final GoalBuddy audit only if all issue-lifecycle gates pass."
    inputs:
      - "docs/roadmaps/agent_prompts/M_downstream_integration_smoke_tests.md"
      - "docs/goals/downstream-integration-smokes/notes/issue_scope.md"
      - "tests/api/test_downstream_integration_smokes.py"
      - "docs/pages/downstream_local_installs.rst"
    constraints:
      - "Do not mark full_outcome_complete true until validation, PR checks, mergeability, issue closure, and branch cleanup requirements are complete."
      - "Do not merge if GitHub checks fail, are pending, or are unavailable."
      - "Do not force-delete local branches."
      - "Do not add application-specific public APIs or finite-difference derivative routes."
    expected_output:
      - "Focused draft PR with Closes #96."
      - "Self-review against origin/main."
      - "Final audit receipt with full_outcome_complete true only after merge and cleanup, or a precise BLOCKED_* status."
