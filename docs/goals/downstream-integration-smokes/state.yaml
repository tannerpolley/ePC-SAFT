    interpreted_outcome: "A GoalBuddy board exists for Task M, records the dependency gate, and blocks implementation until dependencies F, G, I, J, and K are satisfied."
    input_shape: existing_plan
    audience: "epcsaft maintainers and downstream integration consumers"
    authority: requested
    proof_type: test
    completion_proof: "Downstream projects can exercise generic epcsaft APIs without private workaround code, copied EOS implementation, or application-specific public APIs."
    likely_misfire: "Starting implementation early or adding downstream-specific public APIs to epcsaft."
    blind_spots_considered:
      - "Task M must stay generic and downstream projects must compute their own application-specific metrics."
      - "Issue scope for GitHub issue #96 will be recorded during /goal execution after the issue is read."
      - "Bounded watcher auto-run is required."
      - "No finite difference is allowed."
    existing_plan_facts:
      - "Task key: M."
      - "Title: Downstream integration smoke tests."
      - "Assigned branch: codex/downstream-integration-smokes."
      - "Dependencies: F, G, I, J, K."
      - "Prompt file: docs/roadmaps/agent_prompts/M_downstream_integration_smoke_tests.md."
      - "Use the local live GoalBuddy board in Codex."
      - "Do not create local .worktrees/."
      - "Do not add application-specific public APIs."
      - "No finite difference."
      - "Do not start implementation until the dependency gate passes."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: pending
    url: null
    command: "node C:\\Users\\Tanner\\.codex\\plugins\\cache\\goalbuddy\\goalbuddy\\0.3.6\\skills\\goalbuddy\\extend\\local-goal-board\\scripts\\local-goal-board.mjs --goal docs/goals/downstream-integration-smokes"
