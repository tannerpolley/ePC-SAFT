  poll_interval_seconds: 120
  max_wait_minutes: 480
  dependency_gate_path: "docs/goals/downstream-integration-smokes/notes/dependency_gate.yaml"
  watch_script_path: "docs/goals/downstream-integration-smokes/notes/watch_dependency.ps1"
  update_mode: ff-only

